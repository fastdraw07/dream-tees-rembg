# render.yaml — lets Render deploy this service automatically from the repo.
# In Render: New + -> Blueprint -> point at the repo containing this file.
services:
  - type: web
    name: dream-tees-rembg
    runtime: python
    plan: starter         # 512MB, no spin-down. Bump to "standard" (2GB) if u2netp quality is insufficient and you need full u2net.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /
    autoDeploy: true
